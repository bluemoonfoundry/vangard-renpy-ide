name: Release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.7.1-beta4)'
        required: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos-arm64
          - os: macos-15-intel
            platform: macos-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build and package
        run: npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Suffix macOS DMG with platform
        if: runner.os == 'macOS'
        shell: bash
        run: |
          for f in release/*.dmg; do
            [ -f "$f" ] || continue
            mv "$f" "${f%.dmg}-${{ matrix.platform }}.dmg"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Detect prerelease
        id: prerelease
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if echo "$TAG" | grep -qiE 'alpha|beta|rc'; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.prerelease.outputs.value }}
          make_latest: ${{ steps.prerelease.outputs.value == 'false' }}
          fail_on_unmatched_files: true
          body: |
            ## Platform downloads
            | Platform | Filename |
            |---|---|
            | macOS (Apple Silicon) | `renide-*.dmg` (from `macos-arm64`) |
            | macOS (Intel) | `renide-*.dmg` (from `macos-intel`) |
            | Windows | `renide-Setup-*.exe` |
            | Linux | `renide-*.AppImage` |

            **Checksums:** See `SHA256SUMS.txt` below.
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
            artifacts/SHA256SUMS.txt
