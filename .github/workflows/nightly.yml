name: Nightly Build

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 4 * * *' # 4am UTC daily
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos-arm64
          - os: macos-15-intel
            platform: macos-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build and package
        run: npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename release artifacts to static names
        shell: bash
        run: |
          PLATFORM="${{ matrix.platform }}"
          mkdir -p final-artifacts
          # Move and rename files to static names to ensure they overwrite on the Release page
          for f in release/*.exe release/*.dmg release/*.AppImage release/*.zip; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            mv "$f" "final-artifacts/renide-nightly-${PLATFORM}.${ext}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          # Using a static name here ensures artifacts are grouped together in the UI
          name: nightly-build-${{ matrix.platform }}
          path: final-artifacts/*

  publish:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute SHA256 checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Generate changelog
        id: changelog
        run: |
          CHANGES=$(git log --since="25 hours ago" --pretty=format:"- %s (%h)" --no-merges)
          if [ -z "$CHANGES" ]; then
            CHANGES="- No new commits in the last 24 hours"
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish rolling nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (Latest)"
          prerelease: true
          make_latest: false
          # This setting ensures existing files with the same name are overwritten
          overwrite: true 
          body: |
            > ⚠️ **Pre-release for power users.** Built from `main` at `${{ github.sha }}`. 
            > This release is updated daily. Existing files are overwritten.

            ## Changes in the last 24 hours
            ${{ steps.changelog.outputs.changes }}

            ## Platform downloads
            | Platform | Filename |
            |---|---|
            | macOS (Apple Silicon) | `renide-nightly-macos-arm64.dmg` |
            | macOS (Intel) | `renide-nightly-macos-intel.dmg` |
            | Windows | `renide-nightly-win.exe` |
            | Linux | `renide-nightly-linux.AppImage` |

            **Checksums:** See `SHA256SUMS.txt` below.
          files: artifacts/*
